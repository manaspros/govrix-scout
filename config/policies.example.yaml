# Example policy configuration for Govrix PolicyEngine.
#
# Copy this file to policies.yaml and adjust rules to match your environment.
# Load it at startup with PolicyEngine::load_rules_from_file().
#
# Each policy has an ID, name, enabled flag, and a list of rules.
# Rules define what to scan for and what action to take.

policies:
  - id: pii-detection
    name: "PII Detection"
    enabled: true
    rules:
      - scan_for: [email, phone, ssn, credit_card, ip_address]
        action: alert
        severity: high

  - id: budget-cap
    name: "Daily Budget Cap"
    enabled: true
    rules:
      - agent_class: "*"
        daily_cost_limit_usd: 100.0
        daily_token_limit: 1000000
        action: block
