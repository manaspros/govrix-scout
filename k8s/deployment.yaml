apiVersion: apps/v1
kind: Deployment
metadata:
  name: Govrix Scout
  namespace: Govrix Scout
  labels:
    app: Govrix Scout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: Govrix Scout
  template:
    metadata:
      labels:
        app: Govrix Scout
    spec:
      containers:
      - name: Govrix Scout
        image: Govrix Scout:latest
        ports:
        - containerPort: 4000
          name: proxy
        - containerPort: 4001
          name: api
        env:
        - name: govrix_scout_LOG
          value: "Govrix Scout=info"
        - name: RUST_LOG
          value: "Govrix Scout=info"
        livenessProbe:
          httpGet:
            path: /health
            port: 4001
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 4001
          initialDelaySeconds: 5
          periodSeconds: 10
