version: '3.9'

volumes:
  pgdata:

networks:
  govrix:

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: govrix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: govrix
      POSTGRES_USER: govrix
      POSTGRES_PASSWORD: govrix_scout_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - govrix
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U govrix -d govrix"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  proxy:
    image: ghcr.io/manaspros/govrix-scout:latest
    container_name: govrix-proxy
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOVRIX_DATABASE_URL: postgres://govrix:govrix_scout_dev@postgres:5432/govrix
      GOVRIX_PROXY_PORT: "4000"
      GOVRIX_API_PORT: "4001"
      RUST_LOG: "govrix_scout_proxy=info"
    ports:
      - "4000:4000"
      - "4001:4001"
    networks:
      - govrix
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  dashboard:
    image: ghcr.io/manaspros/govrix-scout-dashboard:latest
    container_name: govrix-dashboard
    restart: unless-stopped
    depends_on:
      proxy:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - govrix
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
