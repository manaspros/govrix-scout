version: '3.9'

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  govrix-scout:
    driver: bridge

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL + TimescaleDB ───────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: govrix-scout-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: govrix
      POSTGRES_USER: govrix
      POSTGRES_PASSWORD: govrix_scout_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Run init SQL on first start
      - ../init:/docker-entrypoint-initdb.d:ro
    networks:
      - govrix-scout
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govrix -d govrix"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Govrix Scout Proxy + API ──────────────────────────────────────────────────
  proxy:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: govrix-scout-proxy
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOVRIX_DATABASE__URL: postgres://govrix:govrix_scout_dev@postgres:5432/govrix
      GOVRIX_DATABASE__MAX_CONNECTIONS: "20"
      GOVRIX_DATABASE__MIN_CONNECTIONS: "2"
      GOVRIX_PROXY__LISTEN_ADDR: "0.0.0.0:4000"
      GOVRIX_API__LISTEN_ADDR: "0.0.0.0:4001"
      GOVRIX_METRICS__LISTEN_ADDR: "0.0.0.0:9090"
      RUST_LOG: "govrix_scout_proxy=info,tower_http=debug"
    ports:
      - "4000:4000"   # Proxy (hot path)
      - "4001:4001"   # REST API
      - "9090:9090"   # Prometheus metrics
    networks:
      - govrix-scout
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── React Dashboard (nginx) ────────────────────────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: govrix-scout-dashboard
    restart: unless-stopped
    depends_on:
      proxy:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - govrix-scout
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
